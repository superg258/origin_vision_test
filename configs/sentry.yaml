enemy_color: "red"
# enemy_color: "blue"


#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5_0526.xml
device: GPU
auto_aim_device: GPU
omni_device: NPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi: 
  x: 420
  y: 350
  width: 600
  height: 600

use_roi: false

#####-----USB相机参数-----#####
image_width: 1920
image_height: 1080
fov_h: 57.7 #87.7
fov_v: 56.7 
new_fov_h: 27 #67
new_fov_v: 40.9
usb_frame_rate: 50
usb_exposure: 500 #1-80000______250
usb_gamma: 160
usb_gain: 60 #0-96
usb_max_reopen_attempts: 0 # 0表示持续重连，不因累计重连次数放弃
omni_camera_read_timeout_ms: 10
omni_left_path: "v4l/by-path/pci-0000:00:14.0-usb-0:6.3:1.0-video-index0"
omni_right_path: "v4l/by-path/pci-0000:00:14.0-usb-0:6.4:1.0-video-index0"
omni_back_path: "v4l/by-path/pci-0000:00:14.0-usb-0:6.1:1.0-video-index0"
omni_left_yaw_deg: 60.0
omni_right_yaw_deg: -60.0
omni_back_yaw_deg: 180.0
omni_fov_h_deg: 120.0
omni_fov_v_deg: 67.0

#####-----工业相机参数-----#####
camera_name: "hikrobot"
exposure_ms: 0.6
gain: 16.9
vid_pid: "2bdf:0001"

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
min_confidence: 0.8

#####-----cboard参数-----#####
quaternion_canid: 0x01
bullet_speed_canid: 0x110
send_canid: 0xff
can_interface: "can0"

#####-----时序参数-----#####
timing:
  offset: 0.002 # s, 图像时间戳到姿态查询的固定补偿

#####-----ROS2云台桥参数-----#####
ros2_gimbal:
  node_name: "nav_gimbal_bridge"
  status_topic: "/serial/gimbal_status"
  cmd_topic: "/serial/process_gimbal"
  # 状态消息兼容旧格式；若电控在末尾追加 float32 gimbal_big_yaw(deg, 连续角)，ovsentry_omni 会优先使用它作为 omni 基准 yaw。
  status_msg_type: "rm_interfaces/msg/Gimbal"
  cmd_msg_type: "rm_interfaces/msg/GimbalCmd"

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 25
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: 0.75 # degree -2.5
pitch_offset: -0.49  # degree 2
comming_angle: 60 # degree
leaving_angle: 20 # degree
decision_speed: 10 # rad/s
high_speed_delay_time: 0.073 # s
low_speed_delay_time: 0.065 # s

#####-----shooter参数-----#####
first_tolerance: 5 # 近距离射击容差，degree
second_tolerance: 2 # 远距离射击容差，degree
judge_distance: 3 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击
high_spin_force_fire_enabled: false
high_spin_force_fire_enter_speed: 11.0 # rad/s
high_spin_force_fire_exit_speed: 9.0 # rad/s

#####-----decider参数-----#####
mode: 1
omni_retarget_cooldown_s: 2.5 # omni大幅重定向CD，防止主相机未接上时连续大角度来回转
omni_retarget_min_delta_deg: 20.0 # 仅大于该角度的新omni目标才算一次新的大幅重定向
omni_detection_stale_ms: 120.0 # 多线程omni检测结果的时效窗口，避免略旧结果触发切换

#####-----工业相机标定参数-----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

# 相机同理想情况的偏角: yaw1 pitch0.8 roll0.48 degree
R_camera2gimbal: [-0.017334843897, 0.014105771177, 0.999750234012, -0.999814650151, 0.008132541389, -0.017450705247, -0.008376665811, -0.999867435708, 0.013962180339]
t_camera2gimbal: [0.081834836810026332, 0.0038077150929364738, 0.087564665738670097]

# 重投影误差: 0.2408px
camera_matrix: [1819.6288746257767, 0, 710.02392632862222, 0, 1820.2802320435612, 563.68047553227132, 0, 0, 1]
distort_coeffs: [-0.072363804824114322, 0.18129952721338904, 0.0010944209124647635, 0.0011406459460747969, 0]
